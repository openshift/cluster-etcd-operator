apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: etcd-sa-clusterrole
rules:
  - apiGroups:
      - etcd.openshift.io
    resources:
      - pacemakerstatuses
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - etcd.openshift.io
    resources:
      - pacemakerstatuses/status
    verbs:
      - get
      - update
      - patch
